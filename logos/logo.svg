<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80" fill="none">
  <!-- 04: Code Lines to Chat - represents intelligent, zero-annotation AI chat -->
  <!-- Code lines (source code / zero-annotation discovery) -->
  <g stroke="#64748B" stroke-width="1.8" stroke-linecap="round" opacity="0.75">
    <path d="M14 18 L28 18"/>
    <path d="M14 26 L32 26"/>
    <path d="M14 34 L24 34"/>
    <!-- Brackets suggesting code -->
    <path d="M10 15 L10 37 M38 15 L38 37"/>
  </g>
  <!-- Chat bubble (AI chat assistant) -->
  <path d="M42 12 Q42 6 48 6 L78 6 Q84 6 84 12 L84 36 Q84 42 78 42 L52 42 L44 50 L47 42 Q42 42 42 36 Z" 
        fill="none" stroke="#3B82F6" stroke-width="3"/>
  <!-- AI intelligence accents (neural connections inside bubble) -->
  <g stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
    <path d="M52 16 L60 22"/>
    <path d="M56 28 L64 18"/>
    <circle cx="58" cy="20" r="2" fill="#8B5CF6"/>
  </g>
  <!-- Emergent guidance path (auto-discovered assistance) -->
  <path d="M88 24 Q102 16 120 24" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arrow head for chat response / guidance -->
  <path d="M120 24 L134 24" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
  <polygon points="137 24 128 20 128 28" fill="#0F172A"/>
  <!-- Wordmark -->
  <text x="145" y="36" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="26" font-weight="700" fill="#0F172A" letter-spacing="-0.6">Wayfinder</text>
  <text x="145" y="52" font-family="Inter, system-ui, -apple-system, sans-serif" 
        font-size="9" fill="#64748B" letter-spacing="0.8">INTELLIGENT ZERO-ANNOTATION AI CHAT</text>
</svg>